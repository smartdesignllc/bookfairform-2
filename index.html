    /* Ensure responsive width for iframe */
    #JotFormIFrame-260552386981466 { width: 100%; border: 0; display: block; }
  </style>
</head>

<body>
  <main class="container">
    

    <div class="form-wrap">
      <iframe
        id="JotFormIFrame-260552386981466"
        title="Registration Form (Exhibitor)"
        allow="geolocation; microphone; camera; fullscreen; payment"
        allowtransparency="true"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
        sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-downloads"
        src="https://form.jotform.com/260552386981466"
        frameborder="0"
        style="min-width:100%;max-width:100%;height:539px;border:none;"
        scrolling="no"
      ></iframe>
    </div>

    <noscript>
      Your browser does not support JavaScript.  
      Please open the form directly:
      <a href="https://form.jotform.com/260552386981466" rel="noopener">Open Form</a>.
    </noscript>
  </main>

  <!-- Jotform official embed handler -->
  <script src="https://cdn.jotfor.ms/s/umd/latest/for-form-embed-handler.js" defer></script>

  <script>
    // Initialize Jotform embed handler after script loads
    window.addEventListener('DOMContentLoaded', function() {
      if (window.jotformEmbedHandler) {
        window.jotformEmbedHandler("iframe[id='JotFormIFrame-260552386981466']", "https://form.jotform.com/");
      }
    });

    // Auto-resize the iframe height via postMessage
    (function () {
      var iframe = document.getElementById('JotFormIFrame-260552386981466');

      window.addEventListener('message', function (e) {
        if (!e.data) return;
        var data = (typeof e.data === 'string') ? e.data : '';

        if (data.indexOf('setHeight') > -1) {
          var args = data.split(':');
          if (args.length > 1) {
            var newHeight = parseInt(args[args.length - 1], 10);
            if (!isNaN(newHeight) && newHeight > 300) {
              iframe.style.height = newHeight + 'px';
            }
          }
        }

        // Optional: scroll form into view
        // if (data.indexOf('scrollIntoView') > -1) iframe.scrollIntoView();
      }, false);
    })();
  </script>
